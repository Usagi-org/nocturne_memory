name: E2E Tests

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///${{ github.workspace }}/.tmp/e2e-smoke.db
      SNAPSHOT_DIR: ${{ github.workspace }}/.tmp/snapshots
      VALID_DOMAINS: core,writer,game,notes,project
      CORE_MEMORY_URIS: core://agent,core://my_user
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PYTHON: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend and frontend
        run: |
          mkdir -p .tmp/snapshots
          nohup python backend/main.py > backend.log 2>&1 &
          nohup npm --prefix frontend run dev -- --host 127.0.0.1 > frontend.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              break
            fi
            sleep 2
          done

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              break
            fi
            sleep 2
          done

      - name: Run smoke E2E suite
        working-directory: frontend
        run: npm run test:e2e -- --grep @smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: |
            backend.log
            frontend.log
            frontend/playwright-report

  e2e-full-sqlite:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///${{ github.workspace }}/.tmp/e2e-full.db
      SNAPSHOT_DIR: ${{ github.workspace }}/.tmp/full-snapshots
      VALID_DOMAINS: core,writer,game,notes,project
      CORE_MEMORY_URIS: core://agent,core://my_user
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PYTHON: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend and frontend
        run: |
          mkdir -p .tmp/full-snapshots
          nohup python backend/main.py > backend-full.log 2>&1 &
          nohup npm --prefix frontend run dev -- --host 127.0.0.1 > frontend-full.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              break
            fi
            sleep 2
          done

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              break
            fi
            sleep 2
          done

      - name: Run full SQLite E2E suite
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload full SQLite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-sqlite-artifacts
          path: |
            backend-full.log
            frontend-full.log
            frontend/playwright-report

  e2e-full-docker:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: nocturne_memory
      POSTGRES_USER: nocturne
      POSTGRES_PASSWORD: nocturne
      VALID_DOMAINS: core,writer,game,notes,project
      CORE_MEMORY_URIS: core://agent,core://my_user
      NGINX_PORT: 8765
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8765
      E2E_SEED_COMMAND: docker compose exec -T backend-api python scripts/e2e_seed.py

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start Docker Compose stack
        run: docker compose up -d --build postgres backend-api backend-sse nginx

      - name: Wait for nginx health
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:8765/health > /dev/null; then
              break
            fi
            sleep 3
          done

      - name: Run full Docker-backed E2E suite
        working-directory: frontend
        run: npm run test:e2e

      - name: Capture Docker logs
        if: always()
        run: docker compose logs --no-color > docker-compose.log

      - name: Upload Docker E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-docker-artifacts
          path: |
            docker-compose.log
            frontend/playwright-report

      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose down -v
